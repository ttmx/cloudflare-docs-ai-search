link: "/ai-search/platform/release-note/"
productName: AI Search
productLink: "/ai-search/"
entries:
  - publish_date: "2026-06-24"
    title: Configurable similarity cache duration and on-demand purge
    description: |-
      You can now control how long AI Search retains cached responses with the `cache_ttl` setting, from 10 minutes up to 6 days. The default is now 48 hours, from the previous fixed duration of 30 days. You can also purge all cached responses for an instance on demand. Refer to [similarity cache](/ai-search/configuration/retrieval/cache/).
  - publish_date: "2026-06-24"
    title: Additional file type support
    description: |-
      Built-in storage, R2, and website data sources now support `.mdoc`, `.sql`, and `.log.gz` files. Refer to [supported file types](/ai-search/configuration/data-source/#supported-file-types) for the full list.
  - publish_date: "2026-06-18"
    title: Migration to managed infrastructure complete
    description: |-
      All AI Search instances have finished migrating to managed infrastructure. Every instance now includes built-in storage, a built-in vector index, and built-in web crawling, so the [current limits](/ai-search/platform/limits-pricing/#limits) apply across all instances. Storage, vector indexing, and Browser Run usage for crawling are now included; [Workers AI](/workers-ai/platform/pricing/) and [AI Gateway](/ai-gateway/reference/pricing/) are still billed separately.
      If your instance previously crawled a website, the dedicated R2 bucket AI Search created in your account is no longer used and can be deleted.
  - publish_date: "2026-06-10"
    title: Manage AI Search namespaces with Wrangler CLI
    description: |-
      AI Search now supports namespace-level Wrangler commands to create, list, update, and delete [namespaces](/ai-search/concepts/namespaces/) from the command line. Instance-level commands also accept a `--namespace` flag to target instances within a specific namespace, and `--json` output is available for automation and agent workflows. Refer to [Wrangler commands](/ai-search/wrangler-commands/) for full usage details.
  - publish_date: "2026-05-12"
    title: Automatic migration to managed infrastructure on June 3, 2026
    description: |-
      Instances created before April 16, 2026 will be automatically migrated to managed infrastructure on **June 3, 2026**. The migration may take up to three days with no service downtime expected. No action is required. After migration, instances will include built-in storage, a built-in vector index, and built-in web crawling, and [new limits](/ai-search/platform/limits-pricing/#limits) will apply. For full migration details, refer to [Limits & pricing](/ai-search/platform/limits-pricing/#historical-billing).
  - publish_date: "2026-04-16"
    title: Hybrid search
    description: |-
      AI Search now supports [hybrid search](/ai-search/configuration/indexing/hybrid-search/), combining vector and BM25 keyword search in a single query. Configure the tokenizer, keyword match mode, and fusion method per instance. Refer to [Search modes](/ai-search/concepts/search-modes/) for an overview.
  - publish_date: "2026-04-16"
    title: Relevance boosting
    description: |-
      Boost search results by metadata fields like timestamp or priority using [relevance boosting](/ai-search/configuration/retrieval/boosting/). Configure up to 3 boost fields per instance or per request.
  - publish_date: "2026-04-16"
    title: Cross-instance search
    description: |-
      Search across multiple AI Search instances in a single call using [namespace-level search](/ai-search/api/search/workers-binding/#namespace-level). Results are merged and ranked, with each chunk identifying which instance it came from.
  - publish_date: "2026-04-16"
    title: Built-in storage and vector index
    description: |-
      New AI Search instances come with [built-in storage](/ai-search/configuration/data-source/built-in-storage/) and a [built-in vector index](/ai-search/configuration/indexing/vector-search/#built-in-vector-index). Upload files directly to an instance using the Items API or the dashboard without setting up external infrastructure.
  - publish_date: "2026-04-16"
    title: New AI Search Workers bindings
    description: |-
      Two new [Workers bindings](/ai-search/api/search/workers-binding/) for AI Search. The `ai_search_namespaces` binding gives access to all instances within a [namespace](/ai-search/concepts/namespaces/) and supports dynamic instance management at runtime. The `ai_search` binding binds directly to a single instance for simpler use cases.
  - publish_date: "2026-04-01"
    title: Wrangler CLI support for AI Search
    description: |-
      Manage AI Search instances from the command line with the `wrangler ai-search` command namespace. Create, list, update, delete, search, and get usage statistics for instances without leaving your terminal. All commands support `--json` for structured output that scripts and AI agents can parse directly. Refer to [Wrangler commands](/ai-search/wrangler-commands/) for full usage details.
  - publish_date: "2026-03-23"
    title: Custom metadata filtering
    description: |-
      Define up to 5 custom metadata fields per AI Search instance and filter search results by category, version, or any custom attribute. Attach metadata via R2 custom headers or HTML meta tags.
  - publish_date: "2026-03-23"
    title: Public endpoint, UI snippets, and MCP support
    description: |-
      AI Search now supports [public endpoints](/ai-search/configuration/retrieval/public-endpoint/), [UI snippets](/ai-search/configuration/retrieval/embed-search-snippets/), and [MCP](/ai-search/api/search/mcp/), making it easy to add search to your website or connect AI agents.
  - publish_date: "2026-03-23"
    title: New REST API endpoints
    description: |-
      AI Search introduces new [REST API](/ai-search/api/search/rest-api/) endpoints for search that use an OpenAI-compatible format. You can use the familiar `messages` array structure that works with existing OpenAI SDKs and tools. The previous AutoRAG API endpoints will continue working as expected. New features will only be added to the new API. See the [migration guide](/ai-search/api/migration/rest-api/) for instructions.
  - publish_date: "2026-02-09"
    title: Crawler user agent renamed
    description: |-
      The AI Search crawler user agent has been renamed from `Cloudflare-AutoRAG` to `Cloudflare-AI-Search`. You can continue using the previous user agent name, `Cloudflare-AutoRAG`, in your `robots.txt`. The Bot Detection ID, `122933950` for WAF rules remains unchanged.
  - publish_date: "2026-02-09"
    title: Specify a single sitemap for website crawling
    description: |-
      You can now specify a single sitemap URL in **Parser options** to limit which pages are crawled. By default, AI Search crawls all sitemaps listed in your `robots.txt` from top to bottom.
  - publish_date: "2026-02-09"
    title: Sync individual files
    description: |-
      You can now trigger a sync for a specific file from the dashboard. Go to **Overview** > **Indexed Items** and select the sync icon next to the file you want to reindex.
  - publish_date: "2026-01-22"
    title: New file type support
    description: |-
      AI Search now supports EMACS Lisp (`.el`) files and the `.htm` extension for HTML documents.
  - publish_date: "2026-01-19"
    title: Path filtering for website and R2 data sources
    description: |-
      You can now filter which paths to include or exclude from indexing for both website and R2 data sources.
  - publish_date: "2026-01-19"
    title: Simplified API instance creation
    description: |-
      API instance creation is now simpler with optional token_id and model fields.
  - publish_date: "2026-01-16"
    title: Website crawler improvements
    description: |-
      Website instances now respect sitemap `<priority>` for indexing order and `<changefreq>` for re-crawl frequency. Added support for `.gz` compressed sitemaps and partial URLs in robots.txt and sitemaps.
  - publish_date: "2026-01-16"
    title: Improved indexing performance
    description: |-
      We have improved indexing performance for all AI Search instances. Support for more and larger files is coming.
  - publish_date: "2025-12-10"
    title: Query rewrite visibility in AI Gateway logs
    description: |-
      Fixed a bug where query rewrites were not visible in the AI Gateway logs.
  - publish_date: "2025-11-19"
    title: Custom HTTP headers for website crawling
    description: |-
      AI Search now supports custom HTTP headers for website crawling, allowing you to index content behind authentication or access controls.
  - publish_date: "2025-10-28"
    title: Reranking and API-based system prompts
    description: |-
      You can now enable reranking to reorder retrieved documents by semantic relevance and set system prompts directly in API requests for per-query control.
  - publish_date: "2025-09-25"
    title: AI Search (formerly AutoRAG) now supports more models
    description: |-
      Connect your provider keys through AI Gateway to use models from OpenAI, Anthropic, and other providers for both embeddings and inference.
  - publish_date: "2025-09-19"
    title: Metrics view for AI Search
    description: |-
      AI Search now includes a Metrics tab to track file indexing, search activity, and top retrievals.
  - publish_date: "2025-09-23"
    title: Support document file types in AutoRAG
    description: |-
      Our [conversion utility](/workers-ai/features/markdown-conversion/) can now convert `.docx` and `.odt` files to Markdown, making these files available to index inside your AutoRAG instance.
  - publish_date: "2025-08-28"
    title: Website data source and NLWeb integration
    description: |-
      AI Search now supports websites as a data source. Connect your domain to automatically crawl and index your site content with continuous re-crawling. Also includes NLWeb integration for conversational search with `/ask` and `/mcp` endpoints.
  - publish_date: "2025-08-20"
    title: Increased maximum query results to 50
    description: |-
      The maximum number of results returned from a query has been increased from **20** to **50**. This allows you to surface more relevant matches in a single request.
  - publish_date: "2025-07-16"
    title: Deleted files now removed from index on next sync
    description: |-
      When a file is deleted from your R2 bucket, its corresponding chunks are now automatically removed from the Vectorize index linked to your AI Search instance during the next sync.
  - publish_date: "2025-07-08"
    title: Faster indexing and new Jobs view
    description: |-
      Indexing is now 3-5x faster. A new Jobs view lets you monitor indexing progress, view job status, and inspect real-time logs.
  - publish_date: "2025-07-08"
    title: Reduced cooldown between syncs
    description: |-
      The cooldown period between sync jobs has been reduced to 3 minutes, allowing you to trigger syncs more frequently.
  - publish_date: "2025-06-16"
    title: Rich format file size limit increased to 4 MB
    description: |-
      You can now index rich format files (e.g., PDF) up to 4 MB in size, up from the previous 1 MB limit.
  - publish_date: "2025-06-12"
    title: Index processing status displayed on dashboard
    description: |-
      The dashboard now includes a new “Processing” step for the indexing pipeline that displays the files currently being processed.
  - publish_date: "2025-06-12"
    title: Sync AI Search REST API published
    description: |-
      You can now trigger a sync job for an AI Search using the [Sync REST API](/api/resources/ai-search/subresources/rags/methods/sync/). This scans your data source for changes and queues updated or previously errored files for indexing.
  - publish_date: "2025-06-10"
    title: Files modified in the data source will now be updated
    description: |-
      Files modified in your source R2 bucket will now be updated in the AI Search index during the next sync. For example, if you upload a new version of an existing file, the changes will be reflected in the index after the subsequent sync job.
      Please note that deleted files are not yet removed from the index. We are actively working on this functionality.
  - publish_date: "2025-05-31"
    title: Errored files will now be retried in next sync
    description: |-
      Files that failed to index will now be automatically retried in the next indexing job. For instance, if a file initially failed because it was oversized but was then corrected (e.g. replaced with a file of the same name/key within the size limit), it will be re-attempted during the next scheduled sync.
  - publish_date: "2025-05-31"
    title: Fixed character cutoff in recursive chunking
    description: |-
      Resolved an issue where certain characters (e.g. '#') were being cut off during the recursive chunking and embedding process. This fix ensures complete character processing in the indexing process.
  - publish_date: "2025-05-25"
    title: EU jurisdiction R2 buckets now supported
    description: |-
      AI Search now supports R2 buckets configured with European Union (EU) jurisdiction restrictions. Previously, files in EU-restricted R2 buckets would not index when linked. This issue has been resolved, and all EU-restricted R2 buckets should now function as expected.
  - publish_date: "2025-06-19"
    title: Filter search by file name
    description: |-
      You can now filter AI Search queries by file name using the `filename` attribute for more control over which files are searched.
  - publish_date: "2025-06-19"
    title: Custom metadata in search responses
    description: |-
      AI Search now returns custom metadata in search responses. You can also add a `context` field to guide AI-generated answers.
  - publish_date: "2025-04-23"
    title: Metadata filtering and multitenancy support
    description: |-
      Filter search results by `folder` and `timestamp` to enable multitenancy and control the scope of retrieved results.
  - publish_date: "2025-04-23"
    title: Response streaming in AI Search binding added
    description: |-
      AI Search now supports response streaming in the `AI Search` method of the [Workers binding](/ai-search/api/search/workers-binding/), allowing you to stream results as they're retrieved by setting `stream: true`.
  - publish_date: "2025-04-07"
    title: AI Search is now in open beta!
    description: |-
      AI Search allows developers to create fully-managed retrieval-augmented generation (RAG) pipelines powered by Cloudflare allowing developers to integrate context-aware AI into their applications without managing infrastructure. Get started today on the [Cloudflare Dashboard](https://dash.cloudflare.com/?to=/:account/ai/autorag).
