---
link: "/browser-run/changelog/"
productName: Browser Run
productLink: "/browser-run/"
entries:
  - publish_date: "2026-06-12"
    title: "New tutorial: Pre-render pages for crawlers"
    description: |-
      * Added a new tutorial on how to [pre-render JavaScript-heavy pages](/browser-run/how-to/pre-render-pages/) using Browser Run and a Worker. The tutorial covers building a pre-rendering endpoint that calls the [`/content` Quick Action](/browser-run/quick-actions/content-endpoint/) to render pages in managed headless Chrome and return crawler-ready HTML for search crawlers, social preview bots, AI indexing jobs, or partner integrations.
  - publish_date: "2026-06-11"
    title: "New formats parameter for /snapshot"
    description: |-
      * The [`/snapshot` endpoint](/browser-run/quick-actions/snapshot/) now supports a `formats` parameter that lets you return multiple page formats in a single API call. Previously, `/snapshot` returned only HTML content and a screenshot. You can now also include Markdown and the accessibility tree in the same response. Refer to the [`/snapshot` documentation](/browser-run/quick-actions/snapshot/) for usage examples and accepted values.
  - publish_date: "2026-05-28"
    title: "Use Quick Actions directly from Workers"
    description: |-
      * You can now call [Quick Actions](/browser-run/quick-actions/) directly from a [Worker](/workers/) using the `quickAction()` method on the [browser binding](/browser-run/reference/wrangler/#bindings). This removes the need for API tokens or external HTTP requests when using Quick Actions within Workers. Supported actions include [screenshot](/browser-run/quick-actions/screenshot-endpoint/), [PDF](/browser-run/quick-actions/pdf-endpoint/), [content](/browser-run/quick-actions/content-endpoint/), [markdown](/browser-run/quick-actions/markdown-endpoint/), [JSON](/browser-run/quick-actions/json-endpoint/), [scrape](/browser-run/quick-actions/scrape-endpoint/), [links](/browser-run/quick-actions/links-endpoint/), and [snapshot](/browser-run/quick-actions/snapshot/). The `quickAction()` method requires a compatibility date of `2026-03-24` or later.
  - publish_date: "2026-04-15"
    title: "@cloudflare/playwright v1.3.0 released"
    description: |-
      * Released version 1.3.0 of [`@cloudflare/playwright`](https://github.com/cloudflare/playwright/releases/tag/v1.3.0). Starting with this version, the library uses the standard CDP (Chrome DevTools Protocol) internally to communicate with Browser Run, replacing the previous chunked protocol. This aligns with Browser Run's [full CDP support](/changelog/post/2026-04-10-browser-rendering-cdp-endpoint/) and prevents compatibility issues when using the latest compatibility dates. If you encounter any issues, you can downgrade by setting a `compatibility_date` prior to `2026-03-17` or by adding the `no_websocket_standard_binary_type` flag. Refer to the [`@cloudflare/playwright` README](https://github.com/cloudflare/playwright?tab=readme-ov-file#cdp-protocol-support) for details.
  - publish_date: "2026-04-15"
    title: "Higher concurrency limits"
    description: |-
      * Increased the default [concurrent browser limit](/browser-run/limits/#workers-paid) for Workers Paid plans from 30 to **120 per account**.
      * Increased new browser instance rate for Workers Paid plans from 30 per minute to **1 per second**.
      * Rate limits across the [limits page](/browser-run/limits/) are now expressed in per-second terms, matching how they are enforced.
  - publish_date: "2026-04-15"
    title: "Live View"
    description: |-
      * [Live View](/browser-run/features/live-view/) lets you see and interact with a remote browser session in real time. Use it to debug automation scripts, monitor what a browser is doing, or manually step in when a task requires human intervention. Access Live View from the Cloudflare dashboard, via the hosted UI at `live.browser.run`, or using native Chrome DevTools.
  - publish_date: "2026-04-15"
    title: "Human in the Loop"
    description: |-
      * [Human in the Loop](/browser-run/features/human-in-the-loop/) lets a human step into a live browser session to handle what automation cannot, such as login pages, CAPTCHAs, or sensitive data entry, then hand control back to the script. Access any active session through [Live View](/browser-run/features/live-view/).
  - publish_date: "2026-04-15"
    title: "Session Recordings"
    description: |-
      * [Session Recordings](/browser-run/features/session-recording/) captures DOM changes, mouse and keyboard events, and page navigation as structured data so you can replay any browser session after it ends. Enable recordings by passing `recording: true` when launching a browser. After the session closes, access recordings from the **Runs** tab in the Cloudflare dashboard or retrieve them via API.
  - publish_date: "2026-04-15"
    title: "WebMCP support"
    description: |-
      * Browser Run now supports [WebMCP](/browser-run/features/webmcp/) (Web Model Context Protocol), which allows websites to declare structured tools that AI agents can discover and execute. WebMCP-enabled browsers are available through the experimental lab browser pool.
  - publish_date: "2026-04-14"
    title: "Wrangler CLI commands for Browser Rendering"
    description: |-
      * Added `wrangler browser` commands to create, manage, and view browser sessions directly from the terminal. Available commands: `create`, `close`, `list`, and `view`. For full usage details, refer to [Wrangler commands](/browser-run/reference/wrangler-commands/).
  - publish_date: "2026-04-13"
    title: "@cloudflare/puppeteer v1.1.0 released"
    description: |-
      * Released version 1.1.0 of [`@cloudflare/puppeteer`](https://github.com/cloudflare/puppeteer/releases/tag/v1.1.0), which replaces the internal chunked protocol with plain CDP. This fixes a compatibility issue when using the latest compatibility dates.
  - publish_date: "2026-04-10"
    title: "Chrome DevTools Protocol (CDP) and MCP client support"
    description: |-
      * Browser Rendering now exposes the [Chrome DevTools Protocol (CDP)](/browser-run/cdp/) as an endpoint. Any CDP-compatible client, including [Puppeteer](/browser-run/cdp/puppeteer/) and [Playwright](/browser-run/cdp/playwright/), can connect from any environment, whether that is [Cloudflare Workers](/workers/), your local machine, or a cloud environment. [MCP clients](/browser-run/cdp/mcp-clients/) like Claude Desktop, Claude Code, Cursor, and OpenCode can also use Browser Rendering as their remote browser.
  - publish_date: "2026-04-06"
    title: "Local development: headful mode (experimental)"
    description: |-
      * You can now run Chrome in visible (headful) mode during local development by setting `X_BROWSER_HEADFUL=true` before running `wrangler dev` or `vite dev`. This makes it easier to visually debug your browser automation scripts. This feature is experimental and may change without notice.
  - publish_date: "2026-03-23"
    title: "@cloudflare/playwright v1.2.0 released"
    description: |-
      * Released version 1.2.0 of [`@cloudflare/playwright`](https://github.com/cloudflare/playwright/releases/tag/v1.2.0), now upgraded to [Playwright v1.58.2](https://playwright.dev/docs/release-notes#version-158).
  - publish_date: "2026-03-17"
    title: "Separate bot detection IDs for Browser Rendering methods"
    description: |-
      * Browser Rendering now uses separate bot detection IDs for the [REST API](/browser-run/quick-actions/) and [Browser Sessions](/browser-run/#integration-methods) versus the [crawl endpoint](/browser-run/quick-actions/crawl-endpoint/), allowing you to identify and control each method independently. For the full list of IDs, refer to [Automatic request headers](/browser-run/reference/automatic-request-headers/#bot-detection).
  - publish_date: "2026-03-10"
    title: "New REST API endpoint: /crawl (Beta)"
    description: |-
      * Added the [`/crawl` endpoint](/browser-run/quick-actions/crawl-endpoint/) (beta) to the REST API. The `/crawl` endpoint scrapes content from a starting URL and follows links across the site, up to a configurable depth or page limit. Responses can be returned as HTML, Markdown, or structured JSON (powered by [Workers AI](/workers-ai/)).
  - publish_date: "2026-03-04"
    title: "Increased REST API rate limits"
    description: |-
      * Increased [REST API rate limits](/browser-run/limits/#workers-paid) for Workers Paid plans from 180 requests per minute (3 per second) to 600 requests per minute (10 per second). No action is needed to benefit from the higher limits.
  - publish_date: "2026-02-26"
    title: "New tutorial: Generate OG images for Astro sites"
    description: |-
      * Added a new tutorial on how to [generate OG images for Astro sites](/browser-run/how-to/og-images-astro/) using Browser Rendering. The tutorial walks through creating an Astro template, using Browser Rendering to screenshot it as a PNG, and serving the generated images.
  - publish_date: "2026-02-24"
    title: "Documentation updates for robots.txt and sitemaps"
    description: |-
      * Added [robots.txt and sitemaps reference page](/browser-run/reference/robots-txt/) with guidance on configuring robots.txt and sitemaps for sites accessed by Browser Rendering, including sitemap index files and caching headers.
  - publish_date: "2026-02-18"
    title: "@cloudflare/playwright v1.1.1 released"
    description: |-
      * Released version 1.1.1 of [`@cloudflare/playwright`](https://github.com/cloudflare/playwright/releases/tag/v1.1.1), which includes a bug fix that resolves a chunking issue that could occur when generating large PDFs. Upgrade to this version to avoid this issue.
  - publish_date: "2026-02-03"
    title: "@cloudflare/puppeteer v1.0.6 released"
    description: |-
      * Released version 1.0.6 of [`@cloudflare/puppeteer`](https://github.com/cloudflare/puppeteer/releases/tag/v1.0.6), which includes a fix for rendering large text PDFs.
  - publish_date: "2026-01-21"
    title: "@cloudflare/puppeteer v1.0.5 released"
    description: |-
      * Released version 1.0.5 of [`@cloudflare/puppeteer`](https://www.npmjs.com/package/@cloudflare/puppeteer/v/1.0.5), which includes a performance optimization for base64 decoding.
  - publish_date: "2026-01-08"
    title: "@cloudflare/playwright v1.1.0 released"
    description: |-
      * Released version 1.1.0 of [`@cloudflare/playwright`](https://github.com/cloudflare/playwright), now upgraded to [Playwright v1.57.0](https://playwright.dev/docs/release-notes#version-157).
  - publish_date: "2026-01-07"
    title: Bug fixes for JSON endpoint, waitForSelector timeout, and WebSocket rendering
    description: |-
      * Updated the [`/json` endpoint](/browser-run/quick-actions/json-endpoint/) fallback model and improved error handling for when plan limits of Workers Free plan users are reached.
      * REST API requests using `waitForSelector` will now correctly fail if the specified selector is not found within the time limit.
      * Fixed an issue where pages using WebSockets were not rendering correctly.
  - publish_date: "2025-12-04"
    title: Added guidance on allowlisting Browser Rendering in Bot Management
    description: |-
      * Added [FAQ guidance](/browser-run/faq/#can-i-allowlist-browser-run-on-my-own-website) on how to create a WAF skip rule to allowlist Browser Rendering requests when using Bot Management on your zone.
  - publish_date: "2025-12-03"
    title: Improved AI JSON response parsing and debugging
    description: |-
      * Added `rawAiResponse` field to [`/json` endpoint](/browser-run/quick-actions/json-endpoint/) error responses, allowing you to inspect the unparsed AI output when JSON parsing fails for easier debugging.
      * Improved AI response handling to better distinguish between valid JSON objects, arrays, and invalid payloads, increasing type safety and reliability.
  - publish_date: "2025-10-21"
    title: Added guidance on REST API timeouts and custom fonts
    description: |-
      * Added [REST API timeouts](/browser-run/reference/timeouts/) page explaining how Browser Rendering uses independent timers (for page load, selectors, and actions) and how to configure them.
      * Updated [Supported fonts](/browser-run/reference/supported-fonts/) guide with instructions on using your own custom fonts via `addStyleTag()` in [Playwright](/browser-run/playwright/) or [Puppeteer](/browser-run/puppeteer/).
  - publish_date: "2025-09-25"
    title: Updates to Playwright, new support for Stagehand, and increased limits
    description: |-
      * [Playwright](/browser-run/playwright/) support in Browser Rendering is now GA. We've upgraded to [Playwright v1.55](https://playwright.dev/docs/release-notes#version-155).
      * Added support for [Stagehand](/browser-run/stagehand/), an open source browser automation framework, powered by [Workers AI](/workers-ai). Stagehand enables developers to build more reliably and flexibly by combining code with natural-language instructions.
      * Increased [limits](/browser-run/limits/#workers-paid) for paid plans on both the [REST API](/browser-run/quick-actions/) and [Browser Sessions](/browser-run/#integration-methods).
  - publish_date: "2025-09-22"
    title: Added `excludeExternalLinks` parameter to `/links` REST endpoint
    description: |-
      * Added `excludeExternalLinks` parameter when using the [`/links` endpoint](/browser-run/quick-actions/links-endpoint/). When set to `true`, links pointing to outside the domain of the requested URL are excluded.
  - publish_date: "2025-09-02"
    title: Added `X-Browser-Ms-Used` response header
    description: |-
      * Each REST API response now includes the `X-Browser-Ms-Used` response header, which reports the browser time (in milliseconds) used by the request.
  - publish_date: "2025-08-20"
    title: Browser Rendering billing goes live
    description: |-
      * Billing for Browser Rendering begins today, August 20th, 2025. See [pricing page](/browser-run/pricing/) for full details. You can monitor usage via the [Cloudflare dashboard](https://dash.cloudflare.com/?to=/:account/workers/browser-run).
  - publish_date: "2025-08-18"
    title: Wrangler updates to local dev
    description: |-
      * Improved the local development experience by updating the method for downloading the dev mode browser and added support for [`/v1/sessions` endpoint](/platform/puppeteer/#list-open-sessions), allowing you to list open browser rendering sessions. Upgrade to `wrangler@4.31.0` to get started.
  - publish_date: "2025-07-29"
    title: Updates to Playwright, local dev support, and REST API
    description: |-
      * [Playwright](/browser-run/playwright/) upgraded to [Playwright v1.54.1](https://github.com/microsoft/playwright/releases/tag/v1.54.1) and [Playwright MCP](/browser-run/playwright/playwright-mcp/) upgraded to be in sync with upstream Playwright MCP v0.0.30.
      * Local development with `npx wrangler dev` now supports [Playwright](/browser-run/playwright/) when using Browser Rendering. Upgrade to the latest version of wrangler to get started.
      * The [`/content` endpoint](/browser-run/quick-actions/content-endpoint/) now returns the page's title, making it easier to identify pages.
      * The [`/json` endpoint](/browser-run/quick-actions/json-endpoint/) now allows you to specify your own AI model for the extraction, using the `custom_ai` parameter.
      * The default viewport size on the [`/screenshot` endpoint](/browser-run/quick-actions/screenshot-endpoint/) has been increased from 800x600 to 1920x1080. You can still override the viewport via request options.
  - publish_date: "2025-07-25"
    title: "@cloudflare/puppeteer 1.0.4 released"
    description: |-
      * We have released version 1.0.4 of [`@cloudflare/puppeteer`](https://github.com/cloudflare/puppeteer), now in sync with Puppeteer v22.13.1.
  - publish_date: "2025-07-24"
    title: Playwright now supported in local development
    description: |-
      * You can now use Playwright with local development. Upgrade to wrangler@4.26.0 to get started.
  - publish_date: "2025-07-16"
    title: Pricing update to Browser Rendering
    description: |-
      * Billing for Browser Rendering starts on August 20, 2025, with usage beyond the included [limits](/browser-run/limits/) charged according to the new [pricing rates](/browser-run/pricing/).
  - publish_date: "2025-07-03"
    title: Local development support
    description: |-
      * We added local development support to Browser Rendering, making it simpler than ever to test and iterate before deploying.
  - publish_date: "2025-06-30"
    title: New Web Bot Auth headers
    description: |-
      * Browser Rendering now supports [Web Bot Auth](/bots/reference/bot-verification/web-bot-auth/) by automatically attaching `Signature-agent`, `Signature`, and `Signature-input ` headers to verify that a request originates from Cloudflare Browser Rendering.
  - publish_date: "2025-06-27"
    title: Bug fix to debug log noise in Workers
    description: |-
      * Fixed an issue where all debug logging was on by default and would flood logs. Debug logs is now off by default but can be re-enabled by setting [`process.env.DEBUG`](https://pptr.dev/guides/debugging#log-devtools-protocol-traffic) when needed.
  - publish_date: "2025-05-26"
    title: Playwright MCP
    description: |-
      * You can now deploy [Playwright MCP](/browser-run/playwright/playwright-mcp/) and use any MCP client to get AI models to interact with Browser Rendering.
  - publish_date: "2025-04-30"
    title: Automatic Request Headers
    description: |-
      * [Clarified Automatic Request headers](/browser-run/reference/automatic-request-headers/) in Browser Rendering. These headers are unique to Browser Rendering, and are automatically included and cannot be removed or overridden.
  - publish_date: "2025-04-07"
    title: New free tier and REST API GA with additional endpoints
    description: |-
      * Browser Rendering now has a new free tier.
      * The [REST API](/browser-run/quick-actions/) is Generally Available.
      * Released new endpoints [`/json`](/browser-run/quick-actions/json-endpoint/), [`/links`](/browser-run/quick-actions/links-endpoint/), and [`/markdown`](/browser-run/quick-actions/markdown-endpoint/).
  - publish_date: "2025-04-04"
    title: Playwright support
    description: |-
      * You can now use [Playwright's](/browser-run/playwright/) browser automation capabilities from Cloudflare Workers.
  - publish_date: "2025-02-27"
    title: New Browser Rendering REST API
    description: |-
      * Released a new [REST API](/browser-run/quick-actions/) in open beta. Available to all customers with a Workers Paid Plan.
  - publish_date: "2025-01-31"
    title: Increased limits
    description: |-
      * Increased the limits on the number of concurrent browsers, and browsers per minute from 2 to 10.
  - publish_date: "2024-08-08"
    title: Update puppeteer to 21.1.0
    description: |-
      * Rebased the fork on the original implementation up till version 21.1.0
  - publish_date: "2024-04-02"
    title: Browser Rendering Available for everyone
    description: |-
      * Browser Rendering is now out of beta and available to all customers with Workers Paid Plan. Analytics and logs are available in Cloudflare's dashboard, under "Worker & Pages".
  - publish_date: "2023-05-19"
    title: Browser Rendering Beta
    description: |-
      * Beta Launch
