<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 240" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .region { font-size: 13px; font-weight: 600; fill: #555; }
    .machine-label { font-size: 13px; font-weight: 600; fill: #555; }
    .box { fill: #f8f9fa; stroke: #d0d5dd; stroke-width: 1.5; rx: 8; }
    .inner-box { fill: #fff; stroke: #d0d5dd; stroke-width: 1.5; rx: 6; }
    .box-hl { fill: #fff3e6; stroke: #f6821f; stroke-width: 1.5; rx: 8; }
    .cache-callout { fill: none; stroke: #3b82f6; stroke-width: 1.5; stroke-dasharray: 4 4; rx: 8; }
    .cache-callout-label { font-size: 11px; font-weight: 600; fill: #1d4ed8; }
    .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .sub-label { font-size: 12px; font-weight: 600; fill: #555; }
    .arrow { stroke: #d0d5dd; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrowhead); }
    .arrow-small { stroke: #d0d5dd; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .workers-icon { fill: #f6821f; }
    .database-icon { stroke: #f6821f; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .planetscale-logo { fill: #1a1a1a; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d0d5dd" />
    </marker>
  </defs>

