<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 100" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .step-num { font-size: 11px; font-weight: 700; fill: #fff; }
    .step-label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
    .step-sub { font-size: 12px; fill: #555; }
    .box { fill: #f8f9fa; stroke: #d0d5dd; stroke-width: 1.5; rx: 8; }
    .pill { fill: #f6821f; rx: 10; ry: 10; }
    .arrow { stroke: #d0d5dd; stroke-width: 1.5; fill: none; marker-end: url(#arw); }
  </style>
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d0d5dd"/>
    </marker>
  </defs>

  <!-- All boxes: 240px wide, 80px tall, 16px x-padding, 14px y-padding -->

  <!-- Step 1 -->
  <rect class="box" x="10" y="8" width="240" height="80"/>
  <rect class="pill" x="26" y="22" width="52" height="20"/>
  <text class="step-num" x="52" y="36" text-anchor="middle">Step 1</text>
  <text class="step-label" x="86" y="36">Get active deployment</text>
  <text class="step-sub" x="26" y="62">Find current version ID</text>

  <line class="arrow" x1="250" y1="48" x2="286" y2="48"/>

  <!-- Step 2 -->
  <rect class="box" x="294" y="8" width="240" height="80"/>
  <rect class="pill" x="310" y="22" width="52" height="20"/>
  <text class="step-num" x="336" y="36" text-anchor="middle">Step 2</text>
  <text class="step-label" x="370" y="36">Find the build</text>
  <text class="step-sub" x="310" y="62">Look up by version ID</text>

  <line class="arrow" x1="534" y1="48" x2="570" y2="48"/>

  <!-- Step 3 -->
  <rect class="box" x="578" y="8" width="240" height="80"/>
  <rect class="pill" x="594" y="22" width="52" height="20"/>
  <text class="step-num" x="620" y="36" text-anchor="middle">Step 3</text>
  <text class="step-label" x="654" y="36">Retrigger build</text>
  <text class="step-sub" x="594" y="62">Same branch &amp; commit</text>
</svg>